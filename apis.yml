aid: shiphero
name: ShipHero
description: 'ShipHero is a warehouse management system (WMS) and fulfillment platform
  designed for brands and third-party logistics (3PL) providers operating eCommerce
  direct-to-consumer fulfillment. The platform exposes a GraphQL public API with 69
  queries, 120 mutations, and 599 types covering inventory, orders, shipments, purchase
  orders, returns, and warehouse operations. Authentication uses JWT bearer tokens
  obtained via username and password credentials, with access tokens valid for 28
  days and refresh-token-based renewal. ShipHero enforces a credit-based rate limit
  system and supports 18 webhook event types for real-time integration with fulfillment
  workflows.

  '
